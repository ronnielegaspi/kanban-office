<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kanban Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#10131c;--bg2:#171b27;--panel:#1b2030;--panel2:#222840;--ink:#e7ecf6;--ink-soft:#9aa6c4;
    --gold:#ffd34d;--teal:#46d6c0;--navy:#2d3f63;--edge:#0a0d14;--line:#2c3450;
    --p0:#ff5147;--p1:#ff9b3d;--p2:#4aa3ff;--p3:#8a93ad;}
  *{box-sizing:border-box;}html,body{margin:0;height:100%;overflow:hidden;}
  body{background:radial-gradient(1200px 700px at 75% -10%,#1b2740 0%,transparent 60%),var(--bg);color:var(--ink);
    font-family:"VT323","Courier New",monospace;font-size:18px;padding:clamp(8px,2vw,22px);image-rendering:pixelated;}
  .wrap{width:min(98vw,2600px);margin:0 auto;height:100%;display:flex;flex-direction:column;}
  .gp{border:2px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:0 0 0 2px #0a0d1466,0 8px 22px #0006 inset;}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:nowrap;margin-bottom:10px;flex:0 0 auto;}
  .brand{display:flex;align-items:center;gap:13px;flex:0 1 auto;min-width:0;}
  .logo{width:50px;height:50px;flex:0 0 auto;background:linear-gradient(160deg,#3a4f7a,#2d3f63);display:grid;place-items:center;color:var(--gold);
    font-family:"Silkscreen",monospace;font-size:20px;border:2px solid var(--gold);border-radius:9px;box-shadow:0 0 12px #ffd34d44;}
  h1{font-family:"Silkscreen",monospace;font-size:clamp(15px,2.4vw,24px);margin:0;color:var(--gold);text-shadow:0 0 10px #ffd34d55;}
  .sub{color:var(--ink-soft);font-size:15px;margin-top:2px;}
  .controls{display:flex;gap:7px;flex-wrap:nowrap;align-items:center;justify-content:flex-end;flex:1 1 auto;min-width:0;overflow-x:auto;}
  .live{display:inline-flex;align-items:center;gap:7px;font-family:"Silkscreen",monospace;font-size:9px;background:var(--bg2);padding:8px 11px;border:2px solid var(--line);border-radius:7px;}
  .live .led{width:9px;height:9px;border-radius:50%;background:#b9332e;} .live.on .led{background:var(--teal);box-shadow:0 0 8px var(--teal);animation:blink 1.1s steps(2) infinite;}
  @keyframes blink{50%{opacity:.4;}}
  .gbtn{font-family:"Silkscreen",monospace;font-size:11px;white-space:nowrap;flex:0 0 auto;background:var(--panel2);color:var(--ink);cursor:pointer;border:2px solid var(--line);border-radius:7px;padding:9px 10px;transition:transform .06s, box-shadow .06s;}
  .gbtn:hover{box-shadow:0 0 10px #46d6c055;border-color:var(--teal);} .gbtn:active{transform:translateY(2px);}
  .gbtn.gold{background:linear-gradient(180deg,#3a3a22,#2a2a18);color:var(--gold);border-color:var(--gold);}
  .stage{flex:1 1 auto;min-height:0;display:flex;}
  .floorcard{background:#0a0c12;padding:8px;border-radius:10px;border:2px solid var(--line);overflow:hidden;flex:1 1 auto;min-height:0;width:100%;display:flex;justify-content:center;align-items:center;}
  canvas{width:100%;height:auto;display:block;image-rendering:pixelated;cursor:default;}
  .hud{display:flex;flex-direction:column;gap:0;min-height:300px;}
  .tabs{display:flex;gap:4px;padding:6px 6px 0;background:var(--bg2);border:2px solid var(--line);border-bottom:none;border-radius:8px 8px 0 0;}
  .tab{flex:1;font-family:"Silkscreen",monospace;font-size:9px;text-align:center;padding:9px 4px;color:var(--ink-soft);background:var(--panel);border:2px solid var(--line);border-bottom:none;border-radius:7px 7px 0 0;cursor:pointer;}
  .tab.active{color:var(--gold);background:var(--panel2);box-shadow:0 -2px 10px #ffd34d33;}
  .tabbody{border:2px solid var(--line);border-radius:0 0 8px 8px;background:var(--panel);padding:12px;max-height:640px;overflow:auto;}
  .sect{font-family:"Silkscreen",monospace;font-size:9px;color:var(--teal);margin:2px 0 6px;letter-spacing:.5px;}
  .proj{font-family:"Silkscreen",monospace;font-size:8px;color:var(--ink-soft);} .rt{font-size:20px;margin:3px 0;color:var(--gold);}
  .why{font-size:14px;color:var(--ink-soft);line-height:1.25;}
  .badge{display:inline-block;font-family:"Silkscreen",monospace;font-size:9px;color:#10131c;padding:3px 7px;border-radius:4px;margin-top:6px;}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:6px 0 10px;}
  .stat{padding:7px 0;text-align:center;border-radius:6px;color:#10131c;} .stat b{display:block;font-family:"Silkscreen",monospace;font-size:15px;} .stat span{font-size:11px;}
  .days{display:flex;flex-direction:column;gap:5px;max-height:150px;overflow:auto;margin-top:4px;}
  .day{border-left:3px solid var(--gold);padding:2px 0 2px 8px;} .day .dn{font-family:"Silkscreen",monospace;font-size:8px;color:var(--teal);}
  .day .ti{font-size:14px;} .day .ti small{color:var(--ink-soft);}
  .ptag{font-family:"Silkscreen",monospace;font-size:7px;color:#10131c;padding:1px 4px;border-radius:3px;margin-right:3px;}
  .doc{font-size:13px;color:var(--ink-soft);} .doc code{background:var(--bg2);padding:1px 5px;border-radius:4px;border:1px solid var(--line);}
  /* agent roster cards */
  .acard{display:flex;align-items:center;gap:9px;padding:8px;border:2px solid var(--line);border-radius:7px;background:var(--bg2);margin-bottom:6px;cursor:pointer;}
  .acard:hover{border-color:var(--teal);} .acard.sel{border-color:var(--gold);box-shadow:0 0 10px #ffd34d33;}
  .ava{width:26px;height:26px;border-radius:5px;flex:0 0 auto;border:2px solid #0008;}
  .acard .nm{font-size:16px;} .acard .rl{font-size:12px;color:var(--ink-soft);}
  .stbar{height:6px;border-radius:3px;background:#0c0f18;border:1px solid var(--line);overflow:hidden;min-width:54px;flex:0 0 54px;}
  .stbar i{display:block;height:100%;width:30%;background:var(--teal);} .stbar.busy i{width:100%;background:var(--gold);}
  .pill{font-family:"Silkscreen",monospace;font-size:7px;padding:2px 5px;border-radius:4px;background:var(--panel2);color:var(--ink-soft);border:1px solid var(--line);}
  /* sub tabs */
  .subtabs{display:flex;gap:4px;margin:6px 0;flex-wrap:wrap;}
  .stab{font-family:"Silkscreen",monospace;font-size:8px;padding:6px 8px;border-radius:6px;border:2px solid var(--line);background:var(--bg2);color:var(--ink-soft);cursor:pointer;}
  .stab.active{color:var(--gold);border-color:var(--gold);}
  .kv{font-size:15px;margin:4px 0;} .kv b{font-family:"Silkscreen",monospace;font-size:8px;color:var(--teal);}
  textarea,input.f,select.f{width:100%;font-family:"VT323",monospace;font-size:15px;border:2px solid var(--line);border-radius:6px;padding:6px;background:#0c0f18;color:var(--ink);outline:none;}
  .row2{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:5px 0;}
  .mini{font-family:"Silkscreen",monospace;font-size:8px;padding:6px 8px;border-radius:6px;border:2px solid var(--line);background:var(--panel2);color:var(--ink);cursor:pointer;}
  .mini.gold{color:var(--gold);border-color:var(--gold);} .mini.red{color:#fff;background:#7a241f;border-color:#b9332e;}
  .hist{font-size:13px;color:var(--ink-soft);max-height:200px;overflow:auto;} .hist .h{padding:3px 0;border-bottom:1px solid var(--line);}
  .aterm{height:150px;overflow:auto;padding:7px 9px;background:#070a06;color:#9ef0a0;font-family:"VT323",monospace;font-size:14px;line-height:1.15;white-space:pre-wrap;word-break:break-word;border:2px solid var(--line);border-radius:6px;}
  .aterm .ln{display:block;}
  .flist{font-size:12px;color:var(--ink-soft);} .flist .f2{display:flex;gap:6px;align-items:center;margin:3px 0;}
  /* kanban board (board tab + modal) */
  .kboard{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  @media(max-width:520px){.kboard{grid-template-columns:repeat(2,1fr);}}
  .kcol{background:#10131c;border:2px solid var(--line);border-radius:7px;display:flex;flex-direction:column;min-height:120px;}
  .kcol-head{font-family:"Silkscreen",monospace;font-size:8px;color:#10131c;padding:6px;border-radius:5px 5px 0 0;display:flex;justify-content:space-between;}
  .kcol-body{padding:5px;display:flex;flex-direction:column;gap:5px;max-height:50vh;overflow:auto;}
  .kcard{background:var(--bg2);border:2px solid var(--line);border-left:5px solid #888;border-radius:5px;padding:5px 6px;cursor:pointer;}
  .kcard:hover{border-color:var(--teal);} .kc-top{display:flex;justify-content:space-between;}
  .kc-id{font-family:"Silkscreen",monospace;font-size:7px;color:var(--ink-soft);} .kc-pri{font-family:"Silkscreen",monospace;font-size:7px;color:#10131c;padding:1px 4px;border-radius:3px;}
  .kc-title{font-size:14px;margin:2px 0;} .kc-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;font-size:11px;color:var(--ink-soft);margin-top:3px;}
  .kc-owner{color:#10131c;font-family:"Silkscreen",monospace;font-size:7px;padding:2px 5px;border-radius:4px;}
  .kc-tag{font-family:"Silkscreen",monospace;font-size:7px;padding:1px 5px;border-radius:4px;color:#fff;border:1px solid rgba(255,255,255,.25);}   /* project tag — outlined so it differs from the owner */
  .kc-hrs{margin-left:auto;color:var(--ink-soft);font-size:11px;}
  .kc-rev{display:inline-flex;align-items:center;gap:3px;font-family:"VT323",monospace;font-size:13px;color:#06121f;background:#7cc4ff;border:1px solid #2a6aa0;padding:0 6px;border-radius:9px;margin:3px 0;}   /* reviewer pill — distinct rounded shape */
  /* terminal */
  .termwrap{position:fixed;left:14px;right:14px;bottom:12px;z-index:40;border:2px solid var(--line);border-radius:9px;overflow:hidden;background:#070a06;box-shadow:0 -6px 24px #0009;}
  .termbar{display:flex;align-items:center;gap:7px;background:#10160e;padding:7px 10px;border-bottom:2px solid var(--line);}
  .termbar b{font-family:"Silkscreen",monospace;font-size:9px;color:#9ef0a0;} .tdot{width:9px;height:9px;border-radius:50%;}
  .tdot.r{background:#e0524f;}.tdot.y{background:#e8b53a;}.tdot.g{background:#46a36a;} .termbar #termstate{margin-left:auto;font-family:"Silkscreen",monospace;font-size:8px;color:#6fa873;}
  .term{height:148px;overflow:auto;padding:8px 11px;font-family:"VT323",monospace;font-size:16px;line-height:1.18;color:#9ef0a0;white-space:pre-wrap;word-break:break-word;}
  .term .ln{display:block;} .sys{color:#7fc7da;}.agent{color:#ffd34d;}.tool{color:#c79bf0;}.ok{color:#7ee787;}.err{color:#ff8d7a;}.dim{color:#5f7a62;}
  .terminput{display:flex;align-items:center;gap:8px;background:#0b0f0a;border-top:2px solid var(--line);padding:7px 10px;}
  .terminput span{color:#9ef0a0;font-family:"Silkscreen",monospace;font-size:11px;}
  .terminput input{flex:1;background:#070a06;border:2px solid #1f2a1c;color:#9ef0a0;font-family:"VT323",monospace;font-size:16px;padding:6px 8px;outline:none;border-radius:5px;}
  /* modal */
  .overlay{position:fixed;inset:0;background:#06080ccc;display:flex;align-items:center;justify-content:center;z-index:50;}
  .overlay.hidden{display:none;} .modal{width:min(640px,94vw);max-height:86vh;overflow:auto;background:var(--panel);border:2px solid var(--gold);border-radius:10px;box-shadow:0 0 30px #ffd34d22;}
  .modal.wide{width:min(1080px,96vw);}
  .gbar2{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:2px 0 8px;}
  .gbar2 .why{margin:0;}
  .gwrap{overflow:auto;max-height:64vh;border:2px solid var(--line);border-radius:9px;background:var(--bg2);}
  .ggrid{display:inline-block;min-width:100%;}
  .ghead{display:flex;position:sticky;top:0;z-index:5;}
  .gcorner{position:sticky;left:0;z-index:6;background:var(--panel);border-right:2px solid var(--line);border-bottom:2px solid var(--line);box-sizing:border-box;display:flex;align-items:center;padding:0 8px;font-family:"Silkscreen",monospace;font-size:8px;color:var(--ink-soft);}
  .ghcell{flex:0 0 auto;text-align:center;font-family:"Silkscreen",monospace;font-size:7px;color:var(--ink-soft);line-height:1.5;padding:4px 0;border-right:1px solid var(--line);border-bottom:2px solid var(--line);box-sizing:border-box;background:var(--panel);}
  .ghcell.wk{background:#10131c;} .ghcell.tdy{color:var(--gold);background:#1d2438;}
  .ghcell b{color:var(--ink);font-size:8px;}
  .grow{display:flex;border-bottom:1px solid var(--line);}
  .grow:nth-child(odd) .gtrack{box-shadow:inset 0 0 0 999px #ffffff05;}
  .gnm{position:sticky;left:0;z-index:4;background:var(--panel);border-right:2px solid var(--line);box-sizing:border-box;padding:6px 8px;overflow:hidden;}
  .gnm .t{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gnm .e{display:flex;gap:4px;align-items:center;margin-top:5px;flex-wrap:nowrap;overflow:hidden;}
  .gnm .e input{font-family:"VT323",monospace;font-size:13px;border:2px solid var(--line);background:#0c0f18;color:var(--ink);border-radius:4px;padding:1px 3px;flex:0 0 auto;}
  .gnm .e .dt{width:104px;} .gnm .e .dy{width:34px;text-align:center;}
  .gnm .e .est{font-size:10px;color:var(--ink-soft);font-family:"Silkscreen",monospace;margin-left:auto;}
  .gtrack{position:relative;flex:0 0 auto;box-sizing:border-box;min-height:42px;}
  .gbar{position:absolute;top:50%;transform:translateY(-50%);height:20px;border-radius:5px;border:1px solid #0008;cursor:grab;display:flex;align-items:center;padding:0 6px;color:#10131c;font-family:"Silkscreen",monospace;font-size:7px;overflow:hidden;box-shadow:0 2px 3px #0006;user-select:none;}
  .gbar:hover{filter:brightness(1.08);} .gbar.drag{cursor:grabbing;z-index:3;filter:brightness(1.12);}
  .ghandle{position:absolute;right:0;top:0;width:9px;height:100%;cursor:ew-resize;border-radius:0 5px 5px 0;background:linear-gradient(90deg,transparent,#0004);}
  .gtoday{position:absolute;top:0;bottom:0;width:0;border-left:2px dashed var(--gold);opacity:.55;z-index:1;pointer-events:none;}
  .mhead{display:flex;align-items:center;background:linear-gradient(180deg,#2d3f63,#22304d);color:var(--gold);padding:10px 12px;font-family:"Silkscreen",monospace;font-size:11px;position:sticky;top:0;}
  .mhead .mx{margin-left:auto;background:var(--gold);color:#10131c;border:none;border-radius:5px;font-size:10px;padding:4px 9px;cursor:pointer;}
  .mbody{padding:14px;font-size:15px;}
  .desc{background:#0c0f18;border:2px solid var(--line);border-radius:6px;padding:8px 10px;margin-top:6px;font-size:14px;color:var(--ink-soft);line-height:1.4;}
  .desc h3{font-size:13px;color:var(--gold);margin:7px 0 2px;font-family:"Silkscreen",monospace;} .desc h4{font-size:12px;color:var(--teal);margin:6px 0 2px;font-family:"Silkscreen",monospace;}
  .desc p{margin:3px 0;} .desc ul,.desc ol{margin:3px 0 4px 18px;} .desc li{margin:2px 0;} .desc code{background:#1a2030;padding:0 4px;border-radius:3px;color:var(--ink);}
  .desc b{color:var(--ink);}
  .notecard{border:2px solid var(--line);border-radius:7px;background:#0c0f18;padding:7px 9px;margin:5px 0;}
  .noterow{display:flex;gap:6px;align-items:center;}
  .notets{flex:1;font-size:11px;color:var(--ink-soft);font-family:"Silkscreen",monospace;}
  .chip{display:inline-block;color:#10131c;font-family:"Silkscreen",monospace;font-size:8px;padding:2px 5px;border-radius:3px;margin-right:5px;}
  footer{margin-top:8px;color:var(--ink-soft);font-size:14px;text-align:center;flex:0 0 auto;} footer code{background:var(--bg2);padding:1px 5px;border-radius:4px;}
  .roster{max-width:1040px;margin:8px auto 0;display:flex;align-items:center;gap:14px;padding:6px 12px;flex-wrap:wrap;justify-content:center;flex:0 0 auto;max-height:22vh;overflow:auto;}
  .rgroup{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .rlabel{font-family:"Silkscreen",monospace;font-size:8px;color:var(--teal);margin-right:3px;}
  .rdiv{width:2px;height:26px;background:var(--line);}
  .rchip{display:flex;align-items:center;gap:8px;padding:5px 9px;border:2px solid var(--line);border-radius:7px;background:var(--bg2);cursor:pointer;}
  .rchip:hover{border-color:var(--gold);box-shadow:0 0 8px #ffd34d33;}
  .rphoto{width:32px;height:32px;border:2px solid #0008;border-radius:5px;image-rendering:pixelated;flex:0 0 auto;background:#222a3d;}
  .rinfo{display:flex;flex-direction:column;line-height:1.05;}
  .rnm{font-size:14px;} .rpos{font-size:11px;color:var(--ink-soft);}
  .rstat{font-size:10px;font-weight:bold;letter-spacing:.3px;display:flex;align-items:center;gap:4px;margin-top:1px;}
  .rstat i{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .rdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .raddchip{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 12px;border:2px dashed var(--teal);border-radius:7px;background:transparent;color:var(--teal);cursor:pointer;font-family:"Silkscreen",monospace;font-size:9px;}
  .raddchip:hover{background:#46d6c01a;}
  .mrp{flex:0 0 auto;border:2px solid #0008;border-radius:4px;image-rendering:pixelated;}
  .xpbar{height:9px;background:#0c0f18;border:2px solid var(--line);border-radius:5px;overflow:hidden;margin:5px 0;}
  .xpbar i{display:block;height:100%;background:linear-gradient(90deg,#46d6c0,#ffd34d);}
  .cosgrid{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
  .cosbtn{font-family:"VT323",monospace;font-size:15px;padding:3px 9px;border:2px solid var(--line);border-radius:6px;background:var(--bg2);color:var(--ink);cursor:pointer;}
  .cosbtn.on{border-color:var(--gold);color:var(--gold);box-shadow:0 0 8px #ffd34d44;}
  .cosbtn.lock{opacity:.45;cursor:not-allowed;}
  .rlv{font-family:"Silkscreen",monospace;font-size:9px;color:var(--gold);}
  #toastwrap{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:9999;align-items:center;pointer-events:none;}
  .toast{background:#11151f;border:2px solid var(--gold);color:var(--ink);font-family:"VT323",monospace;font-size:17px;padding:9px 16px;border-radius:9px;box-shadow:0 6px 22px #000a;opacity:0;transform:translateY(12px);transition:opacity .35s,transform .35s;max-width:60vw;text-align:center;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.ok{border-color:var(--teal);} .toast.err{border-color:#ff5147;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><div class="logo">KO</div>
      <div><h1>KANBAN OFFICE</h1><div class="sub">A living PM office that runs Claude Code in itself.</div></div></div>
    <div class="controls">
      <span class="live gp" id="liveChip"><span class="led"></span><span id="liveTxt">OFFLINE</span></span>
      <button class="gbtn" id="ovBtn">OVERVIEW</button>
      <button class="gbtn" id="bdBtn">BOARD</button>
      <button class="gbtn" id="gnBtn">GANTT</button>
      <button class="gbtn" id="agBtn">AGENTS</button>
      <button class="gbtn" id="pjBtn">PROJECTS</button>
      <button class="gbtn gold" id="notesBtn">NOTES</button>
      <button class="gbtn gold" id="termBtn">▶ TERMINAL</button>
      <button class="gbtn gold" id="rtBtn">🗣️ ROUNDTABLE</button>
      <button class="gbtn" id="autoBtn">AUTO-FLOW</button>
      <button class="gbtn" id="optBtn">⚙ OPTIONS</button>
    </div>
  </header>

  <div class="stage">
    <div class="floorcard"><canvas id="floor" width="1840" height="1008"></canvas></div>
  </div>
  <div class="roster gp" id="roster"></div>

  <footer id="foot">Runs Claude Code in itself — open the TERMINAL to type a request and the team plans it onto the whiteboard.</footer>
</div>

<div class="overlay hidden" id="overlay"><div class="modal"><div class="mhead"><span id="mtitle">—</span><button class="mx" id="mclose">CLOSE ✕</button></div><div class="mbody" id="mbody"></div></div></div>

<script>
const ELECTRON=!!window.munder, SERVER=!ELECTRON&&(location.protocol==='http:'||location.protocol==='https:');
const NICK={architect:"Manager",client:"Lounge Host",scoper:"Sales/Scope",taskwriter:"Accounts",estimator:"Accountant",scheduler:"Scheduling",unreal:"Engineering",gamedesign:"Creative",simulation:"Quality"};
const BUILTIN_IDS={architect:1,client:1,scoper:1,taskwriter:1,estimator:1,scheduler:1,unreal:1,gamedesign:1,simulation:1};
function slugId(s){let b=(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,28)||'agent';let id=b,n=2;while(BUILTIN_IDS[id]||roster.some(a=>a.id===id)||(removedIds&&removedIds.includes(id)))id=b+'-'+(n++);return id;}  // readable id from the role/name, e.g. "game-designer"
function ownerName(id){const a=roster.find(x=>x.id===id);if(a)return a.name||a.role||a.id;if(NICK[id])return NICK[id];return /^agent[0-9a-z]{5,}$/i.test(id||'')?'(unassigned)':(id||'?');}   // never show the raw id code
function ownerColor(id){const a=roster.find(x=>x.id===id);return (a&&a.color)||COLORS[id]||'#777';}
function inferRole(t){const s=(((t&&t.title)||'')+' '+((t&&t.epic)||'')+' '+((t&&t.description)||'')).toLowerCase();   // a SPECIFIC role from the task, not "specialist"
  if(/unreal|blueprint|c\+\+|engine|implement|integration|backend|gameplay code|networking|replicat|api|\bsystem\b|perf|optimi/.test(s))return 'Unreal Engineer';
  if(/design|ux|\bui\b|feature|level|balanc|mechanic|economy|progression|onboarding|loop/.test(s))return 'Game Designer';
  if(/\bsim|physics|\bai\b|behavior|behaviour|\bmodel|telemetry|determin|scenario/.test(s))return 'Simulation Engineer';
  if(/\bart\b|visual|animation|niagara|\bvfx\b|shader|material|render|lighting/.test(s))return 'Technical Artist';
  if(/audio|sound|music|\bsfx\b/.test(s))return 'Audio Designer';
  if(/\btest|\bqa\b|quality|verif/.test(s))return 'QA Engineer';
  return (t&&t.epic)?(t.epic+' Specialist'):'Game Designer';}
function roleCat(s){s=(s||'').toLowerCase();
  if(/unreal|engineer|blueprint|c\+\+|backend|program|develop|integration|networking|gameplay code|\bsystem/.test(s))return 'eng';
  if(/design|\bux\b|\bui\b|gameplay|level|mechanic|balanc|economy|progression|product|feature/.test(s))return 'design';
  if(/\bsim|physics|\bai\b|behavi|telemetry|determin|scenario/.test(s))return 'sim';
  if(/\bart\b|animation|\bvfx\b|shader|render|visual|lighting|niagara/.test(s))return 'art';
  if(/audio|sound|music|\bsfx\b/.test(s))return 'audio';
  if(/\bqa\b|test|quality|verif/.test(s))return 'qa';
  return null;}
function matchAgent(t){const cat=roleCat(NICK[t.owner]||t.owner)||roleCat(inferRole(t));if(!cat)return null;return roster.find(a=>a.id!=='architect'&&a.id!=='client'&&roleCat((a.role||'')+' '+(a.name||''))===cat)||null;}  // best existing team agent — the task's own owner is the strongest signal
function cleanupSpecialistNotes(){if(!activeProj)return;const pd=projData[activeProj];if(!pd||!pd.notes||!pd.notes.length)return;const seen={};let changed=false;
  const covered=role=>{const rc=roleCat(role);return roster.some(a=>a.id!=='architect'&&a.id!=='client'&&((rc&&roleCat((a.role||'')+' '+(a.name||''))===rc)||(a.role||'').toLowerCase()===(role||'').toLowerCase()));};
  pd.notes=pd.notes.filter(n=>{const isReq=n.agent||/🧩/.test(n.text||'');if(!isReq)return true;   // only touch specialist-request notes (incl. old plain-text ones)
    let role=n.agent?n.agent.role:'';
    if(!role){const m=(n.text||'').match(/(?:Missing|Add) specialist:\s*([^—\-·\n]+?)(?:\s*[—\-·]|$)/i);role=m?m[1].trim():'';}
    if(!role||/^agent[0-9a-z]{5,}$/i.test(role)){changed=true;return false;}                 // stale / raw-id / unparseable → drop
    if(covered(role)){changed=true;return false;}                                            // role already on the team → drop
    const cat=roleCat(role)||role.toLowerCase();if(seen[cat]){changed=true;return false;}seen[cat]=1;return true;});  // dedupe by role/category
  if(changed){persistProjects();if(currentPanel==='overview'||currentPanel==='agents')renderTab();}}
function specialistCovered(projId,role){const cat=roleCat(role),rl=(role||'').toLowerCase();   // already on the team OR already requested → no duplicate request
  if(roster.some(a=>a.id!=='architect'&&a.id!=='client'&&((cat&&roleCat((a.role||'')+' '+(a.name||''))===cat)||(a.role||'').toLowerCase()===rl)))return true;
  const pd=projData[projId];if(pd&&pd.notes&&pd.notes.some(n=>n.agent&&((cat&&roleCat(n.agent.role)===cat)||(n.agent.role||'').toLowerCase()===rl)))return true;
  return false;}
function migrateAgentIds(){let changed=false;roster.forEach(a=>{if(/^agent[0-9a-z]{5,}$/i.test(a.id||'')){const old=a.id,nid=slugId(a.role||a.name);if(nid&&nid!==old){
    Object.keys(projData).forEach(pid=>{const tk=projData[pid]&&projData[pid].state&&projData[pid].state.tasks;if(tk)tk.forEach(t=>{if(t.owner===old)t.owner=nid;});});
    if(gameState){if(gameState.xp&&gameState.xp[old]!=null){gameState.xp[nid]=(gameState.xp[nid]||0)+gameState.xp[old];delete gameState.xp[old];}if(gameState.equip&&gameState.equip[old]){gameState.equip[nid]=gameState.equip[old];delete gameState.equip[old];}}
    a.id=nid;if(!removedIds.includes(old))removedIds.push(old);changed=true;}}});
  if(changed){ensureAgents();renderRoster();if(ELECTRON&&window.munder.saveAgents){try{window.munder.saveAgents({agents:roster,removed:removedIds});}catch(e){}removedIds=[];}persistProjects();}}

function startRoundtable(question){if(!ELECTRON){termLine('Roundtable runs in the desktop app.','dim');return;}

  if(!panel.length){toast('Add some specialists to the team first','err');return;}
  roundtable={question,projId:activeProj,pending:{},answers:{},phase:'gather',synthBuf:''};
  panel.forEach(a=>{roundtable.pending[a.id]=true;busyUntil[a.id]=performance.now()-t0+600000;pushHist(a.id,'roundtable: '+question.slice(0,40));

function rtDone(id){if(!roundtable||!roundtable.pending[id])return;delete roundtable.pending[id];busyUntil[id]=performance.now()-t0;

function startRtSynthesis(){const rt=roundtable;if(!rt)return;rt.phase='synth';
  let op='';Object.keys(rt.answers).forEach(id=>{const a=roster.find(x=>x.id===id)||{};op+='\n\n### '+(a.name||id)+' ('+(a.role||NICK[id]||'')+')\n'+(rt.answers[id]||'(no answer)');});

/* ---- hit test / cursor ---- */
function hitTest(lx,ly){
  for(const ph of projHit){if(lx>=ph.x&&lx<=ph.x+ph.w&&ly>=ph.y&&ly<=ph.y+ph.h)return {type:'project',id:ph.id};}
  for(const id in cards){const c=cards[id];if(c.phase==='placed'&&!c.hidden&&lx>=c.x&&lx<=c.x+NOTEW&&ly>=c.y&&ly<=c.y+NOTEH)return {type:'task',task:c.task};}
  // boards take precedence over agents standing in front of them (agents are still clickable elsewhere + in the roster)
  if(lx>=WB.x-3&&lx<=WB.x+WB.w+3&&ly>=WB.y-3&&ly<=WB.y+WB.h+3)return {type:'board'};
  if(lx>=GBD.x-3&&lx<=GBD.x+GBD.w+3&&ly>=GBD.y-3&&ly<=GBD.y+GBD.h+3)return {type:'gantt'};
  for(const a of roster){const e=A[a.id];if(e&&lx>=e.x-7&&lx<=e.x+7&&ly>=e.y-32&&ly<=e.y+1)return {type:'agent',agent:a};}
  return null;}
function toLogical(e){const r=cv.getBoundingClientRect();return {lx:(e.clientX-r.left)/r.width*LOGW,ly:(e.clientY-r.top)/r.height*LOGH};}
cv.addEventListener('mousemove',e=>{const {lx,ly}=toLogical(e);cv.style.cursor=hitTest(lx,ly)?'pointer':'default';});
cv.addEventListener('click',e=>{const {lx,ly}=toLogical(e);const h=hitTest(lx,ly);if(!h)return;
  if(h.type==='task')openTask(h.task);else if(h.type==='agent'){selAgent=h.agent.id;openPanel('agents');}else if(h.type==='board')openPanel('board');else if(h.type==='gantt')openGantt();else if(h.type==='project'){if(h.id==='__new')openCreateProject();else switchProject(h.id);}});

// lightweight markdown for task descriptions (headings, bullets, numbered, **bold** *italic* `code`)
function mdLite(src){if(!src||!src.trim())return '<span class="why">(no description)</span>';let s=esc(src);
  s=s.replace(/^###\s?(.*)$/gm,'<h4>$1</h4>').replace(/^##\s?(.*)$/gm,'<h3>$1</h3>').replace(/^#\s?(.*)$/gm,'<h3>$1</h3>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>');
  const lines=s.split('\n');let out='',ul=false,ol=false;const close=()=>{if(ul){out+='</ul>';ul=false;}if(ol){out+='</ol>';ol=false;}};
  lines.forEach(ln=>{const t=ln.trim();
    if(/^<h[34]>/.test(t)){close();out+=t;}
    else if(/^[-*•]\s+/.test(t)){if(!ul){close();out+='<ul>';ul=true;}out+='<li>'+t.replace(/^[-*•]\s+/,'')+'</li>';}
    else if(/^\d+[.)]\s+/.test(t)){if(!ol){close();out+='<ol>';ol=true;}out+='<li>'+t.replace(/^\d+[.)]\s+/,'')+'</li>';}
    else if(!t){close();}
    else{close();out+='<p>'+t+'</p>';}});
  close();return out;}

function chime(kind){try{_ac=_ac||new (window.AudioContext||window.webkitAudioContext)();const ac=_ac;if(ac.state==='suspended')ac.resume();
  const notes=kind==='err'?[392,294,196]:[523,659,784,1047];let t=ac.currentTime;
  notes.forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='triangle';o.frequency.value=f;o.connect(g);g.connect(ac.destination);const s=t+i*0.10;g.gain.setValueAtTime(0.0001,s);g.gain.exponentialRampToValueAtTime(0.2,s+0.02);g.gain.exponentialRampToValueAtTime(0.0001,s+0.18);o.start(s);o.stop(s+0.2);});}catch(e){}}

  const availW=Math.max(40,card.clientWidth-16);                                 // minus 8px padding each side
  const availH=Math.max(40,card.clientHeight-16);
  const ar=1840/1008;let w=availW,h=w/ar;if(h>availH){h=availH;w=h*ar;}          // contain: largest size fitting both
  cv.style.width=Math.round(w)+'px';cv.style.height=Math.round(h)+'px';}
window.addEventListener('resize',fitFloor);
try{const _fc=document.querySelector('.floorcard');if(_fc&&window.ResizeObserver)new ResizeObserver(()=>fitFloor()).observe(_fc);}catch(e){}
ensureAgents();renderRoster();renderTab();fitFloor();setTimeout(fitFloor,60);requestAnimationFrame(drawScene);
</script>
